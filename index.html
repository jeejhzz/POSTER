<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Shop for DoDo</title>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }
        .point-glow { animation: glow 2s infinite; }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px rgba(236, 72, 153, 0.2); }
            50% { text-shadow: 0 0 20px rgba(236, 72, 153, 0.6); }
        }
    </style>
</head>
<body class="bg-pink-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Heart: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
                Gift: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5Z"/></svg>,
                Mail: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
                ExternalLink: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>,
                X: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
                ChevronRight: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>,
                ChevronLeft: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
                Zap: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                Star: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
                Trophy: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
                Music: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
                ShoppingCart: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
                Trash2: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                Phone: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [isLetterOpen, setIsLetterOpen] = useState(false);
            const [selectedGift, setSelectedGift] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isCallModalOpen, setIsCallModalOpen] = useState(false);
            
            // Persistent State with LocalStorage
            const [points, setPoints] = useState(() => {
                const saved = localStorage.getItem('dodo_points');
                return saved !== null ? parseInt(saved) : 220000;
            });

            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('dodo_cart');
                return saved !== null ? JSON.parse(saved) : [];
            });

            const [missionCounts, setMissionCounts] = useState(() => {
                const saved = localStorage.getItem('dodo_missions');
                return saved !== null ? JSON.parse(saved) : {};
            });

            // Save state whenever it changes
            useEffect(() => {
                localStorage.setItem('dodo_points', points.toString());
            }, [points]);

            useEffect(() => {
                localStorage.setItem('dodo_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('dodo_missions', JSON.stringify(missionCounts));
            }, [missionCounts]);

            const missions = [
                { id: 1, title: "오늘의 운동", reward: 3000, max: 1, emoji: "🏋️‍♀️" },
                { id: 2, title: "오늘의 독서", reward: 3000, max: 1, emoji: "📚" },
                { id: 3, title: "준희에게 뽀뽀하기", reward: 1000, max: 10, emoji: "💋" },
                { id: 4, title: "준희에게 칭찬하기", reward: 2000, max: 2, emoji: "👍" },
                { id: 5, title: "준희에게 애교부리기", reward: 3000, max: 3, emoji: "😘" },
                { id: 6, title: "포켓몬 연구일지 쓰기", reward: 1500, max: 1, emoji: "📝" },
                { id: 7, title: "포켓몬GO 루트 걷기", reward: 1000, max: 1, emoji: "🗺️" },
                { id: 8, title: "포켓몬GO 레이드 깨기", reward: 1000, max: 1, emoji: "⚔️" }
            ];

            const gifts = [
                { 
                    id: 1, name: "젠틀몬스터 뉴허", emoji: "😎", youtubeId: "PsxeuLaEBVg", songName: "H.E.R - 블락비",
                    link: "https://www.gentlemonster.com/kr/ko/item/1F68QMBJNI7MW/newher01", 
                    pros: "(도연이를 바라보며) 제니가 쟤니? 라는 반응을 얻을 수 있음", 
                    cons: "너무 예뻐서 회사에 쓰고 갔다가 MZ 소리 들을 수도 있음"
                },
                { 
                    id: 2, name: "애플 매직트랙패드", emoji: "🖱️", youtubeId: "h9utY7jHVro", songName: "Magic - 시크릿",
                    link: "https://www.apple.com/kr/shop/product/mxk93kh/a/magic-trackpadusb%E2%80%91c-%ED%99%94%EC%9D%B4%ED%8A%B8-multi-touch-%ED%91%9C%EB%A9%B4", 
                    pros: "손가락 끝에서 펼쳐지는 삶의 질 수직 상승. 데스크테리어의 완성.", 
                    cons: "한 번 쓰면 일반 마우스는 답답해서 못 쓰는 '불치병'에 걸림."
                },
                { 
                    id: 3, name: "메디큐브 부스터브이롤러", emoji: "✨", youtubeId: "YvFocURL7S4", songName: "I AM - IVE",
                    link: "https://themedicube.co.kr/product/detail.html?product_no=2619", 
                    pros: "누가 장카설유라고 했나? 이제부턴 장카설'도'다!!", 
                    cons: "방구석에 쳐박아두게 될 것 같단 나쁜 말은 NoNo!!"
                },
                { 
                    id: 4, name: "나이키 페가수스42", emoji: "🏃🏻‍♀️", youtubeId: "C7D70HFOEwg", songName: "뛰어! - BLACKPINK",
                    link: "https://www.nike.com/kr/t/pegasus-42-womens-road-running-shoes-wsTF7yIV/IB1881-500", 
                    pros: "준희랑 같이 10km 포켓몬런 SSAP가능~", 
                    cons: "달리기 시키다 우리 사이도 멀어질 수도..??"
                },
                { 
                    id: 5, name: "하만카돈 루나", emoji: "🔊", youtubeId: "5iqhMAxPSqM", songName: "Moon River - Audrey Hepburn",
                    link: "https://www.samsung.com/sec/harman-life-style-audio/hk-speaker-luna2-d2c/HKLUNABLK2/", 
                    pros: "귀 뿐만 아니라 눈도 호강할 수 있는 데스크테리어 만능템!", 
                    cons: "음질이 너무 좋아서 집이 순식간에 콘서트홀로 변함"
                },
                { 
                    id: 6, name: "메모 일하도멜", emoji: "🌸", youtubeId: "b1aguvbWrW0", songName: "흔들리는 꽃들 어쩌구 - 장범준",
                    link: "https://www.memoparis.com/products/ilha-do-mel-eau-de-parfum?_pos=1&_psq=il&_ss=e&_v=1.0&variant=49269191115076", 
                    pros: "몸에서 기분 좋은 향기가 나서 행복 지수 상승.", 
                    cons: "나비랑 벌이 도연이가 꽃인 줄 알고 따라옴"
                },
                { 
                    id: 7, name: "롱샴 르플리아쥬", emoji: "👜", youtubeId: "-CvLzkty_yo", songName: "Longchamp - Shorts",
                    link: "https://www.longchamp.com/kr/ko/products/%EC%88%84%EB%8D%94%EB%B0%B1-l-L1899089001.html", 
                    pros: "르플리아쥬, 이거 도도가 원했던 거 맞쥬?", 
                    cons: "도도 납치해서 가방에 넣을 수도 있음"
                }
            ];

            const completeMission = (id, reward, max) => {
                const currentCount = missionCounts[id] || 0;
                if (currentCount < max) {
                    setPoints(p => p + reward);
                    setMissionCounts(prev => ({ ...prev, [id]: currentCount + 1 }));
                }
            };

            const addToCart = (gift) => {
                if (!cart.find(item => item.id === gift.id)) {
                    setCart([...cart, gift]);
                }
                setSelectedGift(null);
                setIsCartOpen(true);
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.id !== id));
            };

            const containerRef = useRef(null);
            const scroll = (direction) => {
                if (containerRef.current) {
                    const scrollAmount = direction === 'left' ? -320 : 320;
                    containerRef.current.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden">
                    {/* Integrated Header Panel */}
                    <header className="relative pt-12 pb-8 text-center bg-white shadow-sm mb-8 rounded-b-[3rem]">
                        <h1 className="text-3xl md:text-4xl font-bold text-pink-500 mb-2 flex items-center justify-center gap-2">
                            <Icon name="Gift" className="w-8 h-8 text-pink-500" />
                            Gift Shop for DoDo
                        </h1>
                        <p className="text-gray-500 italic">2026.04.30 Happy Birthday Doyeon!</p>
                        
                        {/* Control Center: Points & Cart */}
                        <div className="absolute top-4 right-4 md:top-6 md:right-10 flex gap-2">
                            {/* Points Display */}
                            <div className="bg-gradient-to-br from-pink-500 to-rose-400 rounded-2xl px-4 py-2 shadow-md text-white border border-white/20">
                                <div className="flex items-center gap-2 mb-0.5">
                                    <Icon name="Trophy" className="w-3.5 h-3.5" />
                                    <span className="text-[10px] md:text-xs font-bold uppercase tracking-tighter opacity-90">DoDo Point</span>
                                </div>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-xl md:text-2xl font-bold point-glow">{points.toLocaleString()}</span>
                                    <span className="text-[10px] md:text-xs font-medium opacity-80 uppercase">P</span>
                                </div>
                            </div>
                            
                            {/* Cart Icon */}
                            <button 
                                onClick={() => setIsCartOpen(true)}
                                className="relative bg-white p-3 rounded-2xl shadow-md border border-pink-100 text-pink-500 hover:bg-pink-50 transition-colors"
                            >
                                <Icon name="ShoppingCart" />
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-pink-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">
                                        {cart.length}
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6">
                        {/* Letter Section */}
                        <section className="mb-10">
                            <div 
                                onClick={() => setIsLetterOpen(!isLetterOpen)}
                                className={`cursor-pointer transition-all duration-500 transform bg-white p-6 md:p-8 rounded-2xl shadow-lg border-2 border-pink-100 ${isLetterOpen ? 'scale-105' : 'hover:scale-[1.01]'}`}
                            >
                                {!isLetterOpen ? (
                                    <div className="flex flex-col items-center gap-3 py-2">
                                        <Icon name="Mail" className="w-10 h-10 text-pink-400 animate-bounce-slow" />
                                        <p className="text-lg font-medium text-pink-600">준희로부터 온 편지 (클릭!)</p>
                                    </div>
                                ) : (
                                    <div className="relative overflow-hidden">
                                        <div className="absolute top-0 right-0">
                                            <Icon name="Heart" className="w-8 h-8 text-pink-100 fill-pink-100" />
                                        </div>
                                        <div className="space-y-4 leading-relaxed text-gray-700 text-sm md:text-base">
                                            <p className="font-bold text-pink-600 text-xl text-center md:text-left">사랑하는 도연아,</p>
                                            <p>안녕! 벌써 우리가 함께 맞이하는 세 번째 생일이네.</p>
                                            <p>도연이의 스물일곱 번째 생일은 좀 더 특별하게 챙겨주고 싶어서 기프트샵을 열어봤어. 미션을 깨면 포인트가 쑥쑥 오르니까 이걸로 도연이가 갖고 싶은 선물을 마음껏 골라봐.</p>
                                            <p>태어나줘서 고맙고 항상 보살피고 아껴주고 사랑할게.</p>
                                            <div className="pt-4 text-right font-medium">
                                                <p>2026년 4월 19일</p>
                                                <p className="text-xl text-pink-600 font-bold">준희가 💌</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* Mission Board Section */}
                        <section className="mb-16">
                            <div className="flex items-center justify-between mb-6">
                                <div className="flex items-center gap-2">
                                    <Icon name="Zap" className="text-yellow-500 w-6 h-6" />
                                    <h2 className="text-2xl font-bold text-gray-800">포인트 적립 미션</h2>
                                </div>
                                <span className="text-[10px] text-gray-400 italic">* 진행 상황은 자동으로 저장됩니다.</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {missions.map((m) => (
                                    <div key={m.id} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center justify-between transition-all hover:border-pink-200">
                                        <div className="flex items-center gap-4">
                                            <div className="text-3xl">{m.emoji}</div>
                                            <div>
                                                <h3 className="font-bold text-gray-800 text-sm md:text-base">{m.title}</h3>
                                                <p className="text-sm text-pink-500 font-medium">+{m.reward.toLocaleString()} P</p>
                                                <p className="text-[10px] text-gray-400 mt-1">참여: {missionCounts[m.id] || 0}/{m.max}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => completeMission(m.id, m.reward, m.max)}
                                            disabled={(missionCounts[m.id] || 0) >= m.max}
                                            className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${
                                                (missionCounts[m.id] || 0) >= m.max 
                                                ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                                                : 'bg-pink-100 text-pink-600 hover:bg-pink-200 active:scale-95'
                                            }`}
                                        >
                                            {(missionCounts[m.id] || 0) >= m.max ? "완료" : "수행하기"}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Gift Carousel Section */}
                        <section className="mb-12 relative">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                    <Icon name="Heart" className="text-pink-400 w-6 h-6" />
                                    골라~ 골라! 골라~ 골라!
                                </h2>
                                <div className="flex gap-2">
                                    <button onClick={() => scroll('left')} className="p-2 bg-white rounded-full shadow-md hover:bg-pink-50 transition-colors">
                                        <Icon name="ChevronLeft" className="w-5 h-5 text-gray-600" />
                                    </button>
                                    <button onClick={() => scroll('right')} className="p-2 bg-white rounded-full shadow-md hover:bg-pink-50 transition-colors">
                                        <Icon name="ChevronRight" className="w-5 h-5 text-gray-600" />
                                    </button>
                                </div>
                            </div>
                            
                            <div ref={containerRef} className="flex overflow-x-auto gap-6 pb-6 no-scrollbar snap-x scroll-smooth">
                                {gifts.map((gift) => (
                                    <div key={gift.id} onClick={() => setSelectedGift(gift)} className="min-w-[280px] bg-white rounded-3xl p-6 shadow-md hover:shadow-xl transition-all cursor-pointer snap-center border border-pink-50 group relative">
                                        <div className="text-5xl mb-4 text-center group-hover:scale-110 transition-transform">{gift.emoji}</div>
                                        <h3 className="text-lg font-bold mb-4 text-center text-gray-700">{gift.name}</h3>
                                        <div className="space-y-2">
                                            <div className="bg-blue-50 p-3 rounded-xl text-[11px] leading-relaxed">
                                                <span className="font-bold text-blue-600 block mb-0.5">👍 장점</span>
                                                {gift.pros}
                                            </div>
                                            <div className="bg-red-50 p-3 rounded-xl text-[11px] leading-relaxed">
                                                <span className="font-bold text-red-600 block mb-0.5">👎 단점</span>
                                                {gift.cons}
                                            </div>
                                        </div>
                                        <button className="w-full mt-6 bg-pink-500 text-white py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-pink-600 transition-colors shadow-lg shadow-pink-100">
                                            자세히 보기 <Icon name="ChevronRight" className="w-4 h-4" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="text-center text-gray-400 text-xs mt-10">
                        <p>© 2026 Joonhee's Special Gift Service</p>
                    </footer>

                    {/* Modal with Music & Shopping Options */}
                    {selectedGift && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2rem] max-w-sm w-full p-8 relative animate-in fade-in zoom-in duration-300">
                                <button onClick={() => setSelectedGift(null)} className="absolute top-4 right-4 p-2 hover:bg-gray-100 rounded-full transition-colors">
                                    <Icon name="X" className="w-6 h-6 text-gray-400" />
                                </button>
                                
                                <div className="text-center mb-6">
                                    <div className="text-6xl mb-4 animate-bounce-slow">{selectedGift.emoji}</div>
                                    <h3 className="text-2xl font-bold text-gray-800">{selectedGift.name}</h3>
                                    <div className="mt-3 flex flex-col items-center gap-2">
                                        <div className="inline-flex items-center gap-2 px-3 py-1 bg-pink-50 text-pink-500 rounded-full text-xs font-medium border border-pink-100">
                                            <Icon name="Music" className="w-3 h-3" />
                                            {selectedGift.songName}
                                        </div>
                                    </div>
                                </div>

                                <div style={{ width: 0, height: 0, opacity: 0, overflow: 'hidden', position: 'absolute', pointerEvents: 'none' }}>
                                    <iframe 
                                        key={`music-${selectedGift.id}`}
                                        width="100" 
                                        height="100" 
                                        src={`https://www.youtube.com/embed/${selectedGift.youtubeId}?autoplay=1&mute=0&enablejsapi=1&rel=0&origin=${window.location.origin}`} 
                                        allow="autoplay; encrypted-media"
                                        frameBorder="0"
                                    ></iframe>
                                </div>

                                <div className="space-y-3 mb-8">
                                    <div className="border-l-4 border-blue-400 pl-4 py-1">
                                        <p className="text-[10px] font-bold text-blue-500 uppercase">리얼 장점</p>
                                        <p className="text-gray-700 text-sm leading-relaxed">{selectedGift.pros}</p>
                                    </div>
                                    <div className="border-l-4 border-red-400 pl-4 py-1">
                                        <p className="text-[10px] font-bold text-red-500 uppercase">솔직 단점</p>
                                        <p className="text-gray-700 text-sm leading-relaxed">{selectedGift.cons}</p>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2">
                                    <a 
                                        href={selectedGift.link}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full bg-gray-50 text-gray-600 text-center py-3 rounded-2xl font-bold border border-gray-200 flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors"
                                    >
                                        공식 홈페이지 구경하기 <Icon name="ExternalLink" className="w-4 h-4" />
                                    </a>
                                    
                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                        <button 
                                            onClick={() => addToCart(selectedGift)}
                                            className="bg-pink-100 text-pink-600 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-pink-200 transition-colors"
                                        >
                                            <Icon name="ShoppingCart" className="w-4 h-4" /> 장바구니
                                        </button>
                                        <button 
                                            onClick={() => setIsCallModalOpen(true)}
                                            className="bg-pink-500 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-pink-600 transition-all shadow-lg shadow-pink-100 active:scale-95"
                                        >
                                            <Icon name="Phone" className="w-4 h-4" /> 바로구매
                                        </button>
                                    </div>
                                </div>
                                <p className="text-center text-[10px] text-gray-300 mt-4 italic">
                                    * 구매 버튼을 누르면 준희에게 연결됩니다 🤙
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Cart Sidebar Modal */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex justify-end">
                            <div className="bg-white w-full max-w-sm h-full shadow-2xl animate-in slide-in-from-right duration-300 flex flex-col">
                                <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                                    <h2 className="text-2xl font-bold flex items-center gap-2">
                                        <Icon name="ShoppingCart" className="text-pink-500" />
                                        도연이의 장바구니
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                                        <Icon name="X" />
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                                            <Icon name="ShoppingBag" className="w-16 h-16 mb-4" />
                                            <p className="text-lg">장바구니가 텅 비었어요!</p>
                                            <p className="text-sm">마음에 드는 선물을 담아보세요.</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="bg-pink-50/50 rounded-2xl p-4 flex items-center justify-between border border-pink-100">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-3xl">{item.emoji}</span>
                                                    <div>
                                                        <p className="font-bold text-gray-800">{item.name}</p>
                                                        <p className="text-[10px] text-pink-500">Selected Item</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => removeFromCart(item.id)} className="text-gray-400 hover:text-red-500 transition-colors">
                                                    <Icon name="Trash2" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="p-6 border-t border-gray-100 space-y-4 bg-gray-50/50">
                                        <div className="flex justify-between items-center text-gray-600 font-medium">
                                            <span>총 아이템</span>
                                            <span>{cart.length}개</span>
                                        </div>
                                        <button 
                                            onClick={() => setIsCallModalOpen(true)}
                                            className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-pink-600 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Icon name="Phone" className="w-5 h-5" /> 준희에게 일괄 주문하기
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Final Purchase (Call) Modal */}
                    {isCallModalOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] max-w-xs w-full p-10 text-center relative animate-in zoom-in duration-300">
                                <button onClick={() => setIsCallModalOpen(false)} className="absolute top-6 right-6 text-gray-300">
                                    <Icon name="X" />
                                </button>
                                <div className="bg-pink-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-pink-200">
                                    <Icon name="Phone" className="text-white w-10 h-10 animate-pulse" />
                                </div>
                                <h3 className="text-2xl font-bold text-gray-800 mb-2">구매를 확정할까요?</h3>
                                <p className="text-gray-500 text-sm mb-8 leading-relaxed italic">
                                    "준희에게 지금 전화해서<br/>결제해달라고 말해보세요! 💖"
                                </p>
                                <a 
                                    href="tel:010-7926-3820"
                                    className="block w-full bg-pink-500 text-white py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-pink-600 transition-all active:scale-95"
                                >
                                    010-7926-3820
                                </a>
                                <button onClick={() => setIsCallModalOpen(false)} className="mt-4 text-gray-400 text-sm font-medium">
                                    다음에 할게요
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
